<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiments 2</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .viewer-wrap {
      width: 100%; max-width: 700px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .epoch-row { display:flex; align-items:center; gap:10px; font-size:14px; }
    .epoch-row label { font-weight:600; min-width:60px; }
    .epoch-row input[type=range] { flex:1; }
    .epoch-row .val { font-family:Monaco,Consolas,monospace; font-size:13px; min-width:40px; text-align:right; }
    #curve3d-canvas {
      display:block; width:100%; height:460px;
      border:1px solid #ccc; border-radius:4px;
      cursor:grab; background:#fff;
    }
    #curve3d-canvas:active { cursor:grabbing; }
    .controls-row { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; font-size:13px; }
    .slider-group { display:flex; align-items:center; gap:8px; }
    .slider-group label { min-width:30px; color:#555; }
    .slider-group input[type=range] { width:140px; }
    .slider-group .val { font-family:Monaco,Consolas,monospace; font-size:12px; min-width:40px; color:#444; }
    .check-row { display:flex; align-items:center; gap:6px; color:#444; cursor:pointer; }
    .viewer-hint { font-size:12px; color:#aaa; }
    details.orient-details { align-self:flex-start; }
    details.orient-details summary {
      font-size:12px; font-weight:600; color:#888; text-transform:uppercase;
      letter-spacing:0.4px; cursor:pointer; list-style:none;
      display:flex; align-items:center; gap:5px;
    }
    details.orient-details summary::-webkit-details-marker { display:none; }
    details.orient-details summary::before { content:'▶'; font-size:9px; color:#aaa; transition:transform 0.15s; display:inline-block; }
    details.orient-details[open] summary::before { transform:rotate(90deg); }
    details.orient-details .orient-body { display:flex; flex-direction:column; gap:6px; margin-top:6px; padding-left:2px; }
  </style>
</head>
<body>
<div class="container">
  <h1 class="page-title">Experiments 2</h1>
  <p class="section-label">SANDBOX — not part of the main tutorial</p>
  <div class="tutorial-content">
    <p>Weight-space trajectory. Axes: residual (x), sharpness gradient (y), top eigenvector (z).</p>
    <h2>3D Curve Viewer</h2>

    <div class="viewer-wrap">
      <div class="epoch-row">
        <label for="epoch-slider">Epoch</label>
        <input type="range" id="epoch-slider" min="1" max="500" step="1" value="500">
        <span class="val" id="epoch-value">500</span>
      </div>

      <div id="load-status" style="font-size:13px;color:#888;min-height:1.4em;">Loading data…</div>

      <canvas id="curve3d-canvas"></canvas>

      <div class="controls-row">
        <div class="slider-group">
          <label>Rotate</label>
          <input type="range" id="rotx-slider" min="-90" max="0" step="1" value="-10">
          <span class="val" id="rotx-value">-10°</span>
        </div>
        <button id="fix-btn" style="font-size:13px; padding:3px 10px; cursor:pointer;">Fix view</button>

        <label class="check-row">
          <input type="checkbox" id="check-axes" checked> Show axes
        </label>
        <label class="check-row">
          <input type="checkbox" id="check-planes" checked> Show planes
        </label>
      </div>

      <div class="viewer-hint">Drag to pan · scroll to zoom</div>
    </div>
  </div>
</div>
<script type="module" src="visual_3d_exp.js"></script>
</body>
</html>
